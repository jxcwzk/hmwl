spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hmwl?useUnicode=true&characterEncoding=utf-8&characterSetResults=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.hmwl.entity
  configuration:
    default-statement-timeout: 30
    default-fetch-size: 100
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

file:
  upload:
    path: D:/hmwl-4/upload
    url: /api/upload

cos:
  secretId: ${COS_SECRET_ID}
  secretKey: ${COS_SECRET_KEY}
  bucketName: jxcwzk-1342353267
  region: ap-shanghai
  baseUrl: https://jxcwzk-1342353267.cos.ap-shanghai.myqcloud.com

server:
  port: 8081
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8

distance:
  mode: straight
  map:
    provider: tencent
    api-key: ${MAP_API_KEY:}
