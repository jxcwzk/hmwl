spring:
  datasource:
    url: jdbc:mysql://你的生产数据库地址/hmwl?useUnicode=true&characterEncoding=utf-8&characterSetResults=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver

cos:
  secretId: 你的腾讯云SecretId
