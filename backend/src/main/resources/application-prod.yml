spring:
  datasource:
    url: jdbc:mysql:${DB_HOST:localhost}:${DB_PORT:3306}/hmwl?useUnicode=true&characterEncoding=utf-8&characterSetResults=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

cos:
  secretId: ${COS_SECRET_ID:}
  secretKey: ${COS_SECRET_KEY:}
  bucketName: ${COS_BUCKET_NAME:}
  region: ${COS_REGION:ap-shanghai}
  baseUrl: ${COS_BASE_URL:}

wechat:
  miniprogram:
    appid: ${WECHAT_APPID:}
    secret: ${WECHAT_SECRET:}
