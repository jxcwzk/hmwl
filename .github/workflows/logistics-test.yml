name: Logistics Flow Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pytest pytest-html requests

      - name: Start Backend
        run: |
          cd backend
          mvn spring-boot:run &
          sleep 30

      - name: Run Phase 1 & 2 Tests
        run: |
          pytest tests/phase1_normal_flow tests/phase2_exception \
                 --html=reports/api-test-report.html --self-contained-html || true

      - name: Upload Reports
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: reports/
          retention-days: 7

  ui-tests:
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd tests/phase4_ui
          npm install

      - name: Start Services
        run: |
          cd backend && mvn spring-boot:run &
          sleep 30

      - name: Run UI Tests
        run: |
          cd tests/phase4_ui
          node puppeteer-runner.js || true
