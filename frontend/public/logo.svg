<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9363e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="2" y="2" width="56" height="56" rx="8" ry="8" fill="url(#redGrad)"/>
  
  <!-- 卡车简化图形 -->
  <g transform="translate(8, 12)">
    <!-- 车身 -->
    <rect x="0" y="18" width="28" height="14" fill="white" rx="2"/>
    <!-- 车头 -->
    <rect x="28" y="22" width="12" height="10" fill="white" rx="2"/>
    <!-- 车轮1 -->
    <circle cx="8" cy="36" r="5" fill="white"/>
    <circle cx="8" cy="36" r="2" fill="#d9363e"/>
    <!-- 车轮2 -->
    <circle cx="26" cy="36" r="5" fill="white"/>
    <circle cx="26" cy="36" r="2" fill="#d9363e"/>
    <!-- 车厢顶部条纹 -->
    <rect x="2" y="20" width="24" height="3" fill="#d9363e" rx="1"/>
  </g>
  
  <!-- 文字 -->
  <text x="65" y="26" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="bold" fill="#d9363e">红美物流</text>
  <text x="65" y="42" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#666">HONGMEI LOGISTICS</text>
</svg>
